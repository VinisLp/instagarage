name: instacollection
description: "Instacollection - Rede social de colecionáveis"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.12.4

  # Estado e navegação
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0

  # Mídia
  image_picker: ^1.2.1
  cached_network_image: ^3.3.1
  mobile_scanner: ^3.5.6
  flutter_image_compress: ^2.1.0

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.67.0

  # Autenticação
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # Notificações
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19

  # Monetização
  in_app_purchase: ^3.1.13

  # HTTP
  http: ^1.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true